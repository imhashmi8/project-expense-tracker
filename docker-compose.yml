version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: expenseflow-postgres
    environment:
      POSTGRES_DB: expenseflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: expenseflow-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: expenseflow-backend
    environment:
      APP_NAME: ExpenseFlow API
      DEBUG: "true"
      JWT_SECRET: ChangeMeForLocalOnly
      JWT_EXPIRE_MINUTES: "120"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/expenseflow
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGINS: http://localhost:3000
      SEED_DEMO_DATA: "true"
      LOCAL_UPLOADS_DIR: uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: expenseflow-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
